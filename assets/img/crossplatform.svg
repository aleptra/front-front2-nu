<svg viewBox="20 30 160 160" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(100, 100)">
    <g opacity="0.2" stroke="#000" stroke-width="1.5" fill="none">
      <path d="M-70 -30 L-20 0 L30 -30 L-20 -60 Z" />
      <path d="M-50 10 L0 40 L50 10 L0 -20 Z" />
    </g>
    <path d="M-30 50 L20 80 L70 50 L20 20 Z" fill="rgba(0,0,0,0.03)" stroke="#000" stroke-width="3" />
    
    <line x1="-20" y1="-60" x2="20" y2="80" stroke="#000" stroke-width="2" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="16" to="0" dur="1s" repeatCount="indefinite" />
    </line>
    
    <circle cx="20" cy="80" r="4" fill="#000">
      <animate attributeName="r" values="3;6;3" dur="1s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
