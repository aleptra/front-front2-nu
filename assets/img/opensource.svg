<svg viewBox="55 12 95 85" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(100, 5)">
    
    <g stroke="#EEE" stroke-width="1.5" fill="none" stroke-dasharray="3 2">
      <path id="rightBranch" d="M 0 75 H 40 V 50 L 0 20" />
      <path id="leftBranch" d="M 0 75 H -35 V 60 L 0 20" />
    </g>

    <g stroke-width="2" fill="none">
      <path d="M 0 75 V 20" stroke="#000" />
      <path d="M 0 65 V 40" stroke="#000" stroke-opacity="0.1">
        <animate attributeName="stroke-dasharray" values="0,25; 25,0" dur="2s" repeatCount="indefinite" />
      </path>
    </g>

    <polygon points="0,61 14,75 0,89 -14,75" fill="#000">
      <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite" />
    </polygon>

    <g>
      <circle cx="0" cy="20" r="7" stroke="#000" fill="#FFF" stroke-width="2.5" />
      <circle cx="0" cy="20" r="7" stroke="#000" fill="none" stroke-width="1" opacity="0">
        <animate attributeName="r" values="7;12" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.5;0" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>

    <circle r="3.5" fill="#FFF" stroke="#000" stroke-width="2" opacity="1">
      <animateMotion dur="4s" repeatCount="indefinite" keyPoints="0;0.2;0.5;0.8;1;1" keyTimes="0;0.1;0.4;0.7;0.85;1">
        <mpath href="#rightBranch" />
      </animateMotion>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.7;0.8;1" dur="4s" repeatCount="indefinite" />
      <animate attributeName="fill" values="#FFF;#FFF;#000;#000;#FFF" keyTimes="0;0.75;0.8;0.95;1" dur="4s" repeatCount="indefinite" />
      <animate attributeName="r" values="3.5;3.5;5.5;3.5" keyTimes="0;0.75;0.82;1" dur="4s" repeatCount="indefinite" />
    </circle>

    <circle r="3.5" fill="#FFF" stroke="#000" stroke-width="2" opacity="1">
      <animateMotion dur="6s" begin="1.5s" repeatCount="indefinite" keyPoints="0;0.2;0.5;0.8;1;1" keyTimes="0;0.1;0.4;0.7;0.85;1">
        <mpath href="#leftBranch" />
      </animateMotion>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.7;0.8;1" dur="6s" begin="1.5s" repeatCount="indefinite" />
      <animate attributeName="fill" values="#FFF;#FFF;#000;#000;#FFF" keyTimes="0;0.75;0.8;0.95;1" dur="6s" begin="1.5s" repeatCount="indefinite" />
      <animate attributeName="r" values="3.5;3.5;5.5;3.5" keyTimes="0;0.75;0.82;1" dur="6s" begin="1.5s" repeatCount="indefinite" />
    </circle>

  </g>
</svg>
