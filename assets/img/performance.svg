<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="75" fill="none" stroke="#eee" stroke-width="10" />
    <circle cx="0" cy="0" r="75" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="10 40">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
    </circle>

    <circle cx="0" cy="0" r="50" fill="none" stroke="#000" stroke-width="1" opacity="0.2" stroke-dasharray="2 6">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="5s" repeatCount="indefinite" />
    </circle>

    <circle cx="0" cy="0" r="15" fill="#000">
      <animate attributeName="r" values="12;18;12" dur="0.2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.7;1" dur="0.2s" repeatCount="indefinite" />
    </circle>
    
    <path d="M-30 0 H30 M0 -30 V30" stroke="white" stroke-width="2" opacity="0.5" />
  </g>
</svg>
