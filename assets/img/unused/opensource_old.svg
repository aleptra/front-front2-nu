<svg viewBox="20 20 160 155" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(100, 100)">
    <rect x="-15" y="-15" width="30" height="30" rx="4" fill="#000" transform="rotate(45)">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
    </rect>

    <g stroke="#000" stroke-width="2" fill="none">
      <path d="M0 -22 V-70">
        <animate attributeName="stroke-dasharray" values="0,100; 100,0" dur="3s" repeatCount="indefinite" />
      </path>
      <circle cx="0" cy="-70" r="5" fill="white" stroke-width="3" />

      <path d="M22 0 H70" opacity="0.3" stroke-dasharray="2 2" />
      <path d="M-22 0 H-70" opacity="0.3" stroke-dasharray="2 2" />
    </g>

    <circle cx="70" cy="0" r="3" fill="#000">
       <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>