<script src="http://localhost/front/front.js"></script>
<title>Plugin</title>
<template srcdoc="../../index" src="../../_templates/plugins"></template>
<style>
  .loader {
    display: inherit
  }
</style>
<div id="error" class="red" hide>Plugin not found!</div>
<div id="loader" class="loader"></div>
<hr class="bcblack01">
<section bindquery="k:k" data-src="./assets/json/data/extensions.json" data-filterkey="extensions"
  data-filteritem="key:'{k}'" data-loader="#loader" data-set="title:extensions.0.title" data-onerror="show:#error"
  data-onfinish="doctitle:[{title}];settext:#title:[{title}]">
  <div flex>
    <a paddingright="1rem">
      <figure class="p05" bgcolor="#212121" padding="1rem">
        <img class="w5r m0a" data-get="extensions.0.icon">
      </figure>
    </a>
    <div flexdirection="column">
      <h3 id="title"></h3>
      <b data-get="extensions.0.author"></b>
    </div>
  </div>

  <h4 margintop="2rem">Description</h4>
  <hr color="darkgray" margin="0.5rem 0">
  <div color="white" data-get="extensions.0.description"></div>

  <div>
    <h4 margintop="2rem">Attributes</h4>
    <hr color="darkgray" margin="0.5rem 0">
    <table color="white" width="100%">
      <tbody valign="top" data-iterate="extensions.0.attributes.markup">
        <tr>
          <td><code data-get="attribute"></code></td>
          <td data-get="description"></td>
        </tr>
      </tbody>
    </table>
  </div>

</section>
